<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image Fetcher</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light dark;

        --if-bg: #f5f5f5;
        --if-bg-subtle: #fafafa;
        --if-bg-muted: #f5f5f5;
        --if-bg-item: #ffffff;
        --if-text: #1e1e1e;
        --if-text-muted: #4b5563;
        --if-text-subtle: #6b7280;
        --if-text-faint: #666;
        --if-border: rgba(0, 0, 0, 0.08);
        --if-border-strong: rgba(0, 0, 0, 0.12);
        --if-border-soft: rgba(0, 0, 0, 0.06);
        --if-border-dashed: rgba(0, 0, 0, 0.15);
        --if-hover-overlay: rgba(0, 0, 0, 0.06);
        --if-shadow: 0 12px 32px rgba(0, 0, 0, 0.18),
          0 2px 8px rgba(0, 0, 0, 0.1);
        --if-pill-bg: #eef2ff;
        --if-pill-text: #3730a3;
        --if-img-placeholder: #e5e7eb;
        --if-label-text: rgba(0, 0, 0, 0.55);
        --if-scrim: rgba(0, 0, 0, 0.72);
        --if-error-bg: #fef2f2;
        --if-error-border: #fecaca;
        --if-error-text: #991b1b;
        --if-success-bg: #f0fdf4;
        --if-success-border: #bbf7d0;
        --if-success-text: #166534;
        --if-mask-color: black;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --if-bg: #1e1e1e;
          --if-bg-subtle: #242424;
          --if-bg-muted: #2a2a2a;
          --if-bg-item: #262626;
          --if-text: #e5e7eb;
          --if-text-muted: #b3b8c2;
          --if-text-subtle: #9ca3af;
          --if-text-faint: #9ca3af;
          --if-border: rgba(255, 255, 255, 0.1);
          --if-border-strong: rgba(255, 255, 255, 0.18);
          --if-border-soft: rgba(255, 255, 255, 0.08);
          --if-border-dashed: rgba(255, 255, 255, 0.18);
          --if-hover-overlay: rgba(255, 255, 255, 0.08);
          --if-shadow: 0 12px 32px rgba(0, 0, 0, 0.6),
            0 2px 8px rgba(0, 0, 0, 0.4);
          --if-pill-bg: #312e81;
          --if-pill-text: #c7d2fe;
          --if-img-placeholder: #3f3f46;
          --if-label-text: rgba(255, 255, 255, 0.6);
          --if-scrim: rgba(0, 0, 0, 0.82);
          --if-error-bg: #3f1111;
          --if-error-border: #7f1d1d;
          --if-error-text: #fecaca;
          --if-success-bg: #0c2a15;
          --if-success-border: #166534;
          --if-success-text: #bbf7d0;
          --if-mask-color: white;
        }
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--if-bg);
        color: var(--if-text);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Helvetica Neue", "Hiragino Sans",
          "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        font-size: 12px;
        line-height: 1.4;
        overflow: hidden;
      }

      .panel {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--if-bg);
        color: var(--if-text);
      }

      /* ---------- Panel header ---------- */
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 12px 10px;
        border-bottom: 1px solid var(--if-border-soft);
        background: var(--if-bg-subtle);
      }
      .header-title {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        flex: 1 1 auto;
      }
      .header-title .icon {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .header-title h1 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: var(--if-text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .count-pill {
        margin-left: auto;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--if-pill-bg);
        color: var(--if-pill-text);
        font-size: 11px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }
      .count-pill.is-hidden {
        display: none;
      }

      /* ---------- Main ---------- */
      .main {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        overflow-y: auto;
        min-height: 0;
        flex: 1 1 auto;
      }

      .btn {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        transition: background-color 0.15s ease, border-color 0.15s ease,
          color 0.15s ease;
        font-family: inherit;
      }
      .btn-primary {
        background: #0d99ff;
        color: #ffffff;
      }
      .btn-primary:hover {
        background: #007be5;
      }
      .btn-secondary {
        background: var(--if-bg);
        color: var(--if-text);
        border-color: var(--if-border-strong);
      }
      .btn-secondary:hover:not(:disabled) {
        background: var(--if-bg-muted);
      }
      .btn-secondary:disabled {
        color: var(--if-text-subtle);
        cursor: not-allowed;
        opacity: 0.7;
      }

      .status-card {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 8px;
        background: var(--if-bg-muted);
        border: 1px solid var(--if-border-soft);
        color: var(--if-text);
        font-size: 11px;
        line-height: 1.4;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #9ca3af;
        flex-shrink: 0;
      }
      .status-card[data-state="loading"] .status-dot {
        background: #0d99ff;
        animation: dotPulse 1s ease-in-out infinite;
      }
      .status-card[data-state="success"] .status-dot {
        background: #22c55e;
      }
      .status-card[data-state="error"] .status-dot {
        background: #ef4444;
      }
      .status-card[data-state="error"] {
        background: var(--if-error-bg);
        border-color: var(--if-error-border);
        color: var(--if-error-text);
      }
      .status-card[data-state="success"] {
        background: var(--if-success-bg);
        border-color: var(--if-success-border);
        color: var(--if-success-text);
      }
      @keyframes dotPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      /* ---------- Image list ---------- */
      .image-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .image-item {
        display: flex;
        gap: 8px;
        padding: 8px;
        background: var(--if-bg-item);
        border: 1px solid var(--if-border-soft);
        border-radius: 8px;
      }
      .image-item img {
        width: 56px;
        height: 56px;
        border-radius: 6px;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--if-img-placeholder);
      }
      .image-info {
        flex: 1 1 auto;
        min-width: 0;
        font-size: 11px;
        color: var(--if-text-muted);
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .image-info strong {
        color: var(--if-text);
        font-weight: 600;
      }
      .image-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .image-url {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--if-text-subtle);
        font-size: 10px;
      }

      /* ---------- Footer ---------- */
      .footer {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px 12px 12px;
        border-top: 1px solid var(--if-border-soft);
        background: var(--if-bg-subtle);
      }
      .footer-hint {
        font-size: 10px;
        color: var(--if-text-subtle);
        text-align: center;
        min-height: 12px;
      }

      /* ---------- Scan modal ---------- */
      .scan-modal {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        background: var(--if-scrim);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .scan-modal[hidden] {
        display: none;
      }
      .scan-modal-panel {
        position: relative;
        background: var(--if-bg);
        border: 1px solid var(--if-border);
        border-radius: 12px;
        padding: 12px;
        width: calc(100% - 48px);
        max-width: 420px;
        color: var(--if-text);
        animation: scanModal_modalIn 0.25s ease;
        font-family: inherit;
      }
      .scan-modal-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .scan-modal-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--if-text);
      }
      .scan-modal-dots {
        margin-left: auto;
        display: flex;
        gap: 3px;
      }
      .scan-modal-dots > span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #22c55e;
        animation: scanModal_blink 1s ease infinite;
      }
      .scan-modal-dots > span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .scan-modal-dots > span:nth-child(3) {
        animation-delay: 0.4s;
      }
      .scan-modal-progress {
        margin-bottom: 12px;
        padding: 8px 10px;
        border-radius: 6px;
        background: var(--if-bg-muted);
        border: 1px solid var(--if-border);
        font-size: 12px;
        color: var(--if-text);
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .scan-modal-progress[hidden] {
        display: none;
      }
      .scan-modal-progress strong {
        font-weight: 600;
      }
      .scan-modal-progress .secondary {
        color: var(--if-text-subtle);
      }
      .scan-grid-wrap {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
        height: 180px;
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          var(--if-mask-color) 10%,
          var(--if-mask-color) 90%,
          transparent 100%
        );
        mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          var(--if-mask-color) 10%,
          var(--if-mask-color) 90%,
          transparent 100%
        );
      }
      .scan-grid-track {
        animation: scanModal_scrollUp 22s linear infinite;
        will-change: transform;
      }
      .scan-block {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        width: 100%;
        padding-bottom: 6px;
      }
      .scan-cell {
        aspect-ratio: 3 / 4;
        position: relative;
        overflow: hidden;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .scan-cell-base {
        position: absolute;
        inset: 0;
        border-radius: 4px;
        border: 1px dashed var(--if-border-dashed);
        background: var(--if-bg-muted);
        box-sizing: border-box;
        pointer-events: none;
        z-index: 0;
      }
      .scan-cell-accent {
        position: absolute;
        inset: 0;
        border-radius: 4px;
        border: 1px solid var(--apply-ac);
        background: var(--apply-bg);
        box-sizing: border-box;
        pointer-events: none;
        z-index: 0;
        opacity: 0;
        animation: scanModal_cellAccent 2.6s ease-in-out infinite;
        will-change: opacity;
      }
      .scan-cell-line-wrap {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 4;
      }
      .scan-cell-line-travel {
        position: absolute;
        inset: 0;
        animation: scanModal_scanTravel 2.6s ease-in-out infinite;
        will-change: transform;
      }
      .scan-cell-line {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 2px;
        background: var(--apply-ac);
        box-shadow: 0 0 6px var(--apply-ac);
        animation: scanModal_scanFade 2.6s ease-in-out infinite;
        will-change: opacity;
      }
      .scan-cell-icon {
        position: relative;
        z-index: 2;
        animation: scanModal_iconPulse 2.6s ease-in-out infinite;
      }
      .scan-cell-label {
        position: absolute;
        bottom: 3px;
        left: 2px;
        right: 2px;
        font-size: 6px;
        color: var(--if-label-text);
        font-family: monospace;
        text-align: center;
        line-height: 1.1;
        z-index: 1;
        animation: scanModal_labelFade 2.6s ease-in-out infinite;
      }
      .scan-cell-check {
        position: absolute;
        top: 3px;
        right: 3px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--apply-ac);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 6;
        animation: scanModal_checkPop 2.6s ease-in-out infinite;
      }

      @keyframes scanModal_modalIn {
        from {
          opacity: 0;
          transform: scale(0.94);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes scanModal_blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.15;
        }
      }
      @keyframes scanModal_scrollUp {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-50%);
        }
      }
      @keyframes scanModal_cellAccent {
        0%,
        6% {
          opacity: 0;
        }
        10%,
        50% {
          opacity: 1;
        }
        72%,
        100% {
          opacity: 0;
        }
      }
      @keyframes scanModal_scanTravel {
        0%,
        10% {
          transform: translateY(0);
        }
        38%,
        100% {
          transform: translateY(calc(100% - 2px));
        }
      }
      @keyframes scanModal_scanFade {
        0%,
        7% {
          opacity: 0;
        }
        9%,
        38% {
          opacity: 1;
        }
        39%,
        100% {
          opacity: 0;
        }
      }
      @keyframes scanModal_iconPulse {
        0%,
        6% {
          transform: scale(0.92);
          opacity: 0.65;
        }
        15% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.03);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 0.9;
        }
      }
      @keyframes scanModal_labelFade {
        0%,
        10% {
          opacity: 0.45;
        }
        20%,
        45% {
          opacity: 1;
        }
        60%,
        100% {
          opacity: 0.35;
        }
      }
      @keyframes scanModal_checkPop {
        0%,
        32% {
          transform: scale(0);
          opacity: 0;
        }
        38% {
          transform: scale(1.2);
          opacity: 1;
        }
        44%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel" id="panel" role="region" aria-label="Image Fetcher">
      <main class="main">

        <div class="status-card" id="status" data-state="idle">
          <span class="status-dot" aria-hidden="true"></span>
          <div id="statusText">Click "Collect Images" to start</div>
        </div>
        <div id="imageList" class="image-list"></div>
      </main>

      <footer class="footer">
        <button type="button" class="btn btn-primary" id="collectBtn">
          Collect Images
        </button>
      </footer>
    </div>

    <div
      class="scan-modal"
      id="scanModal"
      hidden
      role="alertdialog"
      aria-busy="true"
      aria-label="Scanning images"
    >
      <div class="scan-modal-panel">
        <div class="scan-modal-header">
          <div class="scan-modal-title">Scanning images...</div>
          <div class="scan-modal-dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="scan-modal-progress" id="scanProgress" hidden>
          <strong id="scanProgressCurrent">0</strong>
          <span class="secondary"> / </span>
          <strong id="scanProgressTotal">0</strong>
          <span class="secondary"> scanned</span>
        </div>
        <div class="scan-grid-wrap">
          <div class="scan-grid-track" id="scanGridTrack"></div>
        </div>
      </div>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
