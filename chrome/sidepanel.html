<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        /* Figma Plugin UI と揃えた固定カラー（ライト）。 */
        --color-bg: #ffffff;
        --color-bg-secondary: #f5f5f5;
        --color-bg-tertiary: #ebebeb;
        --color-bg-brand: #0d99ff;
        --color-bg-brand-hover: #007be5;
        --color-bg-disabled: #e6e6e6;
        --color-bg-success-subtle: #ecfdf5;
        --color-bg-danger-subtle: #fef2f2;

        --color-border: #e6e6e6;
        --color-border-strong: #dcdcdc;

        --color-text: #1e1e1e;
        --color-text-secondary: #6f6f6f;
        --color-text-tertiary: #9e9e9e;
        --color-text-disabled: #b3b3b3;
        --color-text-brand: #0d99ff;
        --color-text-success: #14ae5c;
        --color-text-danger: #f24822;

        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-xl: 16px;
        --radius-pill: 9999px;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.08);

        --space-4: 4px;
        --space-6: 6px;
        --space-8: 8px;
        --space-12: 12px;
        --space-16: 16px;
        --space-20: 20px;

        --font-primary: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--color-bg-secondary);
        color-scheme: light;
      }

      body {
        font-family: var(--font-primary);
        font-size: 13px;
        color: var(--color-text);
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 560px;
        margin: 0 auto;
        padding: var(--space-12);
        gap: var(--space-12);
      }

      /* サイドパネル内は視覚的に3つの「カード」に分け、それぞれ角丸で浮かせる */
      .card {
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-sm);
      }

      /* ===== Header ===== */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-12) var(--space-16);
      }

      .header-title {
        display: flex;
        align-items: center;
        gap: var(--space-8);
      }

      .header-title .emoji {
        font-size: 18px;
        line-height: 1;
      }

      .header-title h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        color: var(--color-text);
        letter-spacing: 0.01em;
      }

      .count-pill {
        display: inline-flex;
        align-items: center;
        height: 24px;
        padding: 0 var(--space-12);
        border-radius: var(--radius-pill);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        font-size: 11px;
        color: var(--color-text-secondary);
      }
      .count-pill.is-hidden {
        display: none;
      }
      .count-pill strong {
        color: var(--color-text);
        font-weight: 600;
        margin-right: 4px;
      }

      /* ===== Main: collect + status + list ===== */
      .main {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: var(--space-12) var(--space-16);
        gap: var(--space-12);
        overflow: hidden;
      }

      .main-actions {
        display: flex;
        gap: var(--space-8);
      }

      .main-actions .btn {
        flex: 1;
      }

      /* ===== Status ===== */
      .status-card {
        display: flex;
        align-items: flex-start;
        gap: var(--space-8);
        padding: var(--space-12);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        font-size: 12px;
        line-height: 1.5;
        color: var(--color-text-secondary);
      }

      .status-dot {
        flex: 0 0 auto;
        width: 8px;
        height: 8px;
        margin-top: 5px;
        border-radius: var(--radius-pill);
        background: var(--color-text-tertiary);
      }

      .status-card[data-state="loading"] .status-dot {
        background: var(--color-text-brand);
        animation: pulse 1.1s ease-in-out infinite;
      }
      .status-card[data-state="success"] .status-dot {
        background: var(--color-text-success);
      }
      .status-card[data-state="error"] .status-dot {
        background: var(--color-text-danger);
      }
      .status-card[data-state="success"] {
        background: var(--color-bg-success-subtle);
        border-color: rgba(20, 174, 92, 0.2);
      }
      .status-card[data-state="error"] {
        background: var(--color-bg-danger-subtle);
        border-color: rgba(242, 72, 34, 0.2);
      }

      #statusText {
        color: inherit;
        flex: 1;
        min-width: 0;
        word-break: break-word;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      /* ===== Image list ===== */
      .list-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: var(--space-6);
      }

      .list-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        font-weight: 600;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .image-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: var(--space-6);
        padding-right: 2px;
      }

      .image-list:empty::after {
        content: "収集した画像はここに表示されます";
        display: block;
        padding: var(--space-16);
        text-align: center;
        font-size: 12px;
        color: var(--color-text-tertiary);
        border: 1px dashed var(--color-border);
        border-radius: var(--radius-lg);
        background: var(--color-bg-secondary);
      }

      .image-item {
        display: flex;
        align-items: center;
        gap: var(--space-12);
        padding: var(--space-8);
        background: var(--color-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .image-item:hover {
        border-color: var(--color-border-strong);
        box-shadow: var(--shadow-sm);
      }

      .image-item img {
        flex: 0 0 auto;
        width: 72px;
        height: 54px;
        object-fit: cover;
        border-radius: var(--radius-sm);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
      }

      .image-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .image-info > div {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .image-info strong {
        font-weight: 600;
        color: var(--color-text);
      }

      .image-info > div:first-child {
        color: var(--color-text);
        font-size: 12px;
      }

      .image-title {
        color: var(--color-text-secondary);
        font-size: 11px;
      }

      .image-url {
        color: var(--color-text-tertiary);
        font-size: 11px;
      }

      /* ===== Footer ===== */
      .footer {
        padding: var(--space-12) var(--space-16);
        display: flex;
        flex-direction: column;
        gap: var(--space-8);
      }

      /* ===== Buttons ===== */
      .btn {
        appearance: none;
        border: none;
        width: 100%;
        height: 40px;
        padding: 0 var(--space-12);
        border-radius: var(--radius-lg);
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.15s ease, color 0.15s ease,
          border-color 0.15s ease, opacity 0.15s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-6);
      }

      .btn-primary {
        background: var(--color-bg-brand);
        color: #ffffff;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--color-bg-brand-hover);
      }
      .btn-primary:disabled {
        background: var(--color-bg-disabled);
        color: var(--color-text-disabled);
        cursor: not-allowed;
      }

      .btn-secondary {
        background: var(--color-bg);
        color: var(--color-text);
        border: 1px solid var(--color-border-strong);
      }
      .btn-secondary:hover:not(:disabled) {
        background: var(--color-bg-secondary);
      }
      .btn-secondary:disabled {
        color: var(--color-text-disabled);
        border-color: var(--color-border);
        cursor: not-allowed;
      }

      .footer-hint {
        font-size: 11px;
        color: var(--color-text-secondary);
        text-align: center;
        min-height: 14px;
      }

      /* ===== scrollbar ===== */
      .image-list::-webkit-scrollbar {
        width: 8px;
      }
      .image-list::-webkit-scrollbar-thumb {
        background: var(--color-border-strong);
        border-radius: var(--radius-pill);
      }
      .image-list::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-tertiary);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="card header">
        <div class="header-title">
          <span class="emoji">📸</span>
          <h1>Image Fetcher</h1>
        </div>
        <span class="count-pill is-hidden" id="countPill">
          <strong id="countNumber">0</strong>枚
        </span>
      </section>

      <section class="card main">
        <div class="main-actions">
          <button type="button" class="btn btn-primary" id="collectBtn">
            画像を収集
          </button>
        </div>

        <div class="status-card" id="status" data-state="idle">
          <span class="status-dot" aria-hidden="true"></span>
          <div id="statusText">「画像を収集」ボタンをクリックしてください</div>
        </div>

        <div class="list-wrap">
          <div class="list-header">
            <span>Images</span>
          </div>
          <div id="imageList" class="image-list"></div>
        </div>
      </section>

      <section class="card footer">
        <button type="button" class="btn btn-secondary" id="copyBtn" disabled>
          全てコピー
        </button>
        <div class="footer-hint">
          収集後、クリップボードにコピーできます
        </div>
      </section>
    </div>

    <!-- popup.js と同じ画像収集・コピー・ステータス更新ロジックを流用 -->
    <script src="popup.js"></script>
  </body>
</html>
